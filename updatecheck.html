<title>TurtleWave APK Version Check</title>
<div class="content">
<div class="content" style="flex-direction: column;">
  <h3 id="status">
    Input the version that your browser is currently displaying
  </h3>
  <div class="input-row">
    <input id="versioninput">
    <button style="background-color:lime;" id="checkbutton" onclick="check()">
      Check
    </button>
  </div>
</div>
  <script>
    // manual stuff start :(
    const latestbeta = "1.6BETA";
    const latestversion = "1.6R";
    // manual stuff end :)
     const betaIsNewerThanRelease = (Number(latestbeta.replace("BETA", "")) >  Number(latestversion.replace("R", "")));
    let checked = false;
  function check() {
    if (checked === false) {
      let input = document.getElementById("versioninput").value.trim().toLowerCase();
     if (input === latestversion.toLowerCase()) {
      document.getElementById("status").textContent = "Your browser has the newest release!";
    } else if (input === latestbeta.toLowerCase() && betaIsNewerThanRelease) {
        document.getElementById("status").textContent = "Your browser is up to date! (Debug info: You are on the BETA version of an unfinished release)";
    } else {
      checked = true;
      document.getElementById("status").textContent = "Your browser needs an update";
       document.getElementById("checkbutton").textContent = "Install Update";
      document.getElementById("versioninput").style.display = "none";
    }
    } else {
       document.getElementById("status").textContent = "Scroll down on the new window to update";
    window.open("/shell-surf/index.html?updatemode=y");
    }
   }
  </script>
</div>
