<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Surfer Extensions Store</title>

<style>
html {
    font-family: Arial, sans-serif;
    background: #2c2c2c;
    color: white;
    text-align: center;
}

.extension-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
    padding: 20px;
}

.extension {
    background: #3a3a3a;
    border-radius: 20px;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
}

button {
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #444;
    color: white;
}

button:hover {
    background: #666;
}

.verified {
    color: #00ccff;
    font-size: 0.8rem;
}

.flagged {
    color: red;
    font-size: 0.8rem;
}

.topbar {
    padding: 20px;
}
</style>
</head>

<body>

<div class="topbar">
    <h1>Extension Store</h1>

    <button onclick="gotomanager()">Manage Extensions</button>
    <button onclick="filterverified()">Official Only</button>
    <button onclick="loadextensions()">Reset</button>
</div>

<div class="extension-grid" id="grid"></div>

<script>
let extensions = [];

async function loadextensions() {
    const res = await fetch('/extensions.json');
    extensions = await res.json();
    render(extensions);
}

function render(list) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    list.forEach(ext => {
        const div = document.createElement('div');
        div.className = 'extension';

        let taghtml = '';
        if (ext.tag === 'verified') {
            taghtml = '<p class="verified">Official</p>';
        } else if (ext.tag === 'flagged') {
            taghtml = '<p class="flagged">Flagged</p>';
        }

        div.innerHTML = `
            <h2>${ext.title}</h2>
            <p>${ext.description}</p>
            <small>v${ext.version || "1.0.0"}</small>
            ${taghtml}
            <button onclick="installextension('${encodeURIComponent(JSON.stringify(ext))}')">
                Install
            </button>
        `;

        grid.appendChild(div);
    });
}

function installextension(encoded) {
    const ext = JSON.parse(decodeURIComponent(encoded));

    let installed = JSON.parse(localStorage.getItem('browserextensions') || '[]');

    if (installed.some(e => e.id === ext.id)) {
        alert('already installed');
        return;
    }

    installed.push({
        id: ext.id,
        title: ext.title,
        description: ext.description,
        code: ext.code,
        tag: ext.tag || null,
        version: ext.version || "1.0.0",
        enabled: true,
        mode: ext.mode || "new"
    });

    localStorage.setItem('browserextensions', JSON.stringify(installed));

    alert('installed! restart shell surfer');
}

function filterverified() {
    render(extensions.filter(e => e.tag === 'verified'));
}

function gotomanager() {
    window.location.href = 'ssurf://extensions';
}

loadextensions();
</script>

</body>
</html>
