<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shell Surfer Extensions</title>
    <link id="iconImage" rel="icon" href="https://cdn.glitch.global/369bf8ef-379b-4729-800d-6d834c6d626c/Icon.ico?v=1743040586911" />
    <script src="https://threejsfundamentals.org/threejs/resources/threejs/r127/build/three.js"></script>

    <style>
        html {
            font-family: "Arial", sans-serif;
            font-weight: bold;
            background-color: #2c2c2c;
            color: white;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 90vw;
            max-width: 1200px;
        }

        h1, h2 {
            color: white;
        }

        button {
            font-size: 1vh;
            padding: 10px;
            border-radius: 10px;
            color: white;
            background-color: #444;
            border: none;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

            button:hover {
                background-color: #666;
                transform: scale(1.05);
            }

        .extension-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
            width: 100%;
        }

        .extension {
            background-color: #3a3a3a;
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

            .extension h2 {
                font-size: 1.3rem;
                margin: 0;
            }

            .extension p {
                margin: 0;
                font-size: 0.9rem;
            }

            .extension button {
                margin-top: auto;
            }

        .verified {
            font-size: 0.75rem;
            color: #00ccff;
        }

        .flagged {
            font-size: 0.75rem;
            color: red;
        }

        #manage {
            z-index: 500;
            width: 50%;
            height: 50vh;
            position: fixed;
            left: 25%;
            top: 25%;
            display: none;
            background-color: darkgray;
            border-radius: 3vw;
            transition: 500ms;
            transform: scale(0);
            transform-origin: center;
            padding: 20px;
            overflow: auto;
        }

            #manage h2 {
                color: black;
            }
    </style>
</head>

<body>
    <div class="content" id="main">
        <h1 style="font-size:3vw;">Extension Store</h1>
        <p style="font-size:1.2rem;">
            Installing multiple extensions at once is now possible, but it is in beta, and many glitches will occur if the extensions are incompatible.
        </p>
        <button onclick="(el=>{el.style.display='block';void el.offsetWidth;el.style.transform='scale(1)' })(document.getElementById('manage'))">Manage Extensions</button>
        <button style="margin:1%; background-color:lightgreen; color:black;" onclick="window.location.href='/extensions?d=verifiedonly'">Official Extensions Only</button>
        <div id="manage">
            <h2>
                Delete all extensions
                <button style="background-color:red; color:black; font-weight:bold; font-size:1.2rem;"
                        onclick="alert('All extensions have been deleted. Restart Shell Surfer to see changes.'); get(`console.log('ss.extension.clear')`)">
                    Delete
                </button>
            </h2>
            <h2>
                Check for incompatible extensions
                <button style="color:black; font-weight:bold; font-size:1.2rem;"
                        onclick="alert('Currently checking. If you get brought to a white screen with no error message, the system has detected no incompatible extensions.'); window.location.href='https://turtlewave.glitch.me/shell-surf/loadurl.html?load=function.extensionincompatiable'">
                    Check
                </button>
            </h2>
        </div>

    <div class="extension-grid" id="theextensions"></div>

    <script>
      async function loadExtensions() {
    const res = await fetch('https://raw.githubusercontent.com/TurtleWave-Search/shellsurfer/refs/heads/main/extensions.json');
    const extensions = await res.json();
    const grid = document.getElementById('theextensions');
    grid.innerHTML = '';
    extensions.forEach(ext => {
        const div = document.createElement('div');
        div.className = 'extension';
        let taginhtml = '';
        if (ext.tag === 'verified') {
            taginhtml = `<p class="verified">Shell Surfer Basics</p>`;
        } else if (ext.tag === 'flagged') {
            taginhtml = `<p class="flagged">Flagged</p>`;
        }
        div.innerHTML = `
            <h2>${ext.title}</h2>
            <p>${ext.description}</p>
            <button onclick="${ext.code}">Get</button>
            ${taginhtml}
        `;
        grid.appendChild(div);
    });
}

window.addEventListener("DOMContentLoaded", loadExtensions);
        function get(code) {
            window.location.href = window.location.href + `.html?load=${encodeURI(code)}`;
            if (code.includes("ss.extension.clear")) return;
            alert("Attempting to install... If you receive no follow-up prompt, it has failed.");
        }
            window.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        if (params.get("d") === "verifiedonly") {
            document.querySelectorAll(".extension").forEach(extensionthing => {
                if (!extensionthing.querySelector(".verified")) {
                    extensionthing.style.display = "none";
                }
            });
        }
    });
    </script>
</body>
</html>
